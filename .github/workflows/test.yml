name: CI Build and Test

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "*.md"
      - ".gitignore"
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"
      - ".gitignore"
      - "docs/**"
  workflow_dispatch:
    inputs:
      test-type:
        description: "Type of tests to run"
        required: true
        default: "all"
        type: choice
        options:
          - "all"
          - "build-only"
          - "vectoradd"
      debug:
        description: "Enable debug build"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install clang-format
        run: |
          python -m pip install clang-format==21.1.2

      - name: Install Python formatting tools
        run: |
          python -m pip install -e "./python[dev]"

      - name: Run formatter check
        run: |
          ./format.sh check

  build-and-test:
    runs-on: 4-core-ubuntu-gpu-t4
    timeout-minutes: 60
    env:
      DEBUG: "0"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup environment
        env:
          CUDA_VERSION: "12.8"
        run: |
          bash .ci/setup.sh
      - name: Run tests
        env:
          TEST_TYPE: ${{ github.event.inputs.test-type || 'all' }}
          TIMEOUT: 60
          INSTALL_THIRD_PARTY: 1
        run: |
          bash .ci/run_tests.sh
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-cuda12.8-debug0
          path: |
            tests/vectoradd/*.sass
            tests/vectoradd/*.log
            tests/vectoradd/*.ndjson
            tests/vectoradd/*.ndjson.zstd
            tests/py_add/*.log
            tests/py_add/*.sass
            tests/py_add/*.ndjson
            tests/py_add/*.ndjson.zstd
            tests/py_add/mode*_validation.log
            tests/py_add/mode*_run.log
            tests/py_add/mode1_decompressed.ndjson
  test-triton-nightly:
    runs-on: 4-core-ubuntu-gpu-t4
    timeout-minutes: 30
    env:
      DEBUG: "0"
      CONDA_ENV: "cutracer-triton-nightly"
      # Upstream Triton team's nightly wheel feed (cp310-cp314,
      # x86_64 + aarch64). The "Triton-Nightly" segment is the *feed*
      # name; the package is just `triton`. Versions look like
      # 3.7.0+gitXXXXXXXX.
      TRITON_NIGHTLY_INDEX_URL: "https://aiinfra.pkgs.visualstudio.com/PublicPackages/_packaging/Triton-Nightly/pypi/simple/"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup environment
        env:
          CUDA_VERSION: "12.8"
        run: |
          bash .ci/setup.sh
      - name: Install Triton nightly wheel
        # Replaces the previous 30-50 min source build (which curled
        # tritonparse's install-triton.sh and invoked
        # cmake/ninja/clang on Triton+LLVM). The upstream Triton team
        # publishes prebuilt nightly wheels; proton ships in the wheel
        # and works as expected.
        run: |
          source /opt/miniconda3/etc/profile.d/conda.sh
          conda activate "$CONDA_ENV"
          # PyTorch nightly bundles 'pytorch-triton'; both packages
          # provide 'import triton' so we uninstall any existing
          # variant before installing the upstream nightly to avoid a
          # half-overwritten install. --extra-index-url keeps PyPI as
          # fallback for transitive deps; --pre allows +gitXXXXXXXX
          # version tags.
          pip uninstall -y pytorch-triton triton 2>/dev/null || true
          pip install -U --pre triton --extra-index-url "${TRITON_NIGHTLY_INDEX_URL}"
          python -c "import triton; print(f'Triton: {triton.__version__} from {triton.__file__}')"
      - name: Run tests
        env:
          TEST_TYPE: proton
          TIMEOUT: 60
          INSTALL_THIRD_PARTY: 1
        run: |
          bash .ci/run_tests.sh
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-artifacts-triton-cuda12.8-debug0
          path: |
            tests/proton_tests/*.log
            tests/proton_tests/*.sass
            tests/proton_tests/*.csv
  check-status:
    runs-on: ubuntu-latest
    needs: [build-and-test, test-triton-nightly]
    if: always()
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.build-and-test.result }}" = "success" ] && [ "${{ needs.test-triton-nightly.result }}" = "success" ]; then
              echo "✅ All tests passed!"
          else
              echo "❌ Some tests failed!"
              exit 1
          fi
