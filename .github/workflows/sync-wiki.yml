name: Sync docs to Wiki

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4

      - name: Checkout wiki repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync docs to wiki
        run: |
          rsync -av --delete --exclude '.git' docs/ wiki/

          # Strip .md from any [text](Page-Name.md[#anchor]) link so GitHub
          # Wiki renders them as wiki links. Filename charset: letters,
          # digits, _, -, .
          cd wiki
          for f in *.md; do
            sed -i -E 's/\]\(([A-Za-z0-9_.-]+)\.md(#[^)]*)?\)/](\1\2)/g' "$f"
          done

      - name: Push to wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            git commit -m "Sync docs from main repo ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          fi
